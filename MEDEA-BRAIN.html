<style>

html,body{width:100%;height:100%;overflow:hidden;}
body{background:#050508;font-family:'Courier New',monospace;user-select:none;}
svg{width:100vw;height:100vh;cursor:grab;display:block;}

#legend{position:fixed;top:16px;left:16px;background:rgba(5,5,8,0.92);border:1px solid #0d2010;padding:14px 18px;font-size:9.5px;color:#4b5563;line-height:1.4;}

.ldot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.lline{width:22px;height:1px;flex-shrink:0;}

#title-block{position:fixed;top:16px;right:16px;text-align:right;}

#hint{position:fixed;bottom:14px;left:50%;transform:translateX(-50%);color:#1e2e1e;font-size:9px;letter-spacing:2px;white-space:nowrap;}

#tip{position:fixed;display:none;background:#05100a;border:1px solid rgba(34,168,96,0.3);border-left:2px solid #22a860;padding:11px 15px;font-size:10px;color:#9ca3af;max-width:290px;pointer-events:none;z-index:200;line-height:1.75;white-space:pre-line;}
#tip b{color:#22a860;display:block;margin-bottom:5px;font-size:11px;letter-spacing:0.5px;}
</style>
</head>
<body>
<svg id="svg">
<defs>
  <filter id="gA" x="-60%" y="-60%" width="220%" height="220%">
    <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="b"/>

  <filter id="gB" x="-120%" y="-120%" width="340%" height="340%">

  </filter>

    <feGaussianBlur in="SourceGraphic" stdDeviation="26"/>
  </filter>
  <radialGradient id="bgGrad" cx="50%" cy="45%" r="65%">
    <stop offset="0%" stop-color="#050f08"/>
    <stop offset="100%" stop-color="#050508"/>
  </radialGradient>
</defs>
<g id="canvas">
  <rect id="bgRect" fill="url(#bgGrad)"/>
  <g id="gEdges"></g>
  <g id="gPulses"></g>
  <g id="gNodes"></g>
  <g id="gLabels"></g>
</g>
</svg>

// ─── RENDER ENGINE ─────────────────────────────────────────────────────────
const svg    = document.getElementById('svg');
const cvs    = document.getElementById('canvas');
const bgRect = document.getElementById('bgRect');
const gEdges = document.getElementById('gEdges');
const gPulses= document.getElementById('gPulses');
const gNodes = document.getElementById('gNodes');
const gLabels= document.getElementById('gLabels');
const tip    = document.getElementById('tip');
const nmap   = {};
N.forEach(n => nmap[n.id] = n);

function mkPath(a, b){
  const dx=b.x-a.x, dy=b.y-a.y, len=Math.hypot(dx,dy)||1;
  const px=-dy/len*20, py=dx/len*20;
  const c1x=a.x+dx*0.35+px, c1y=a.y+dy*0.35+py;
  const c2x=a.x+dx*0.65+px, c2y=a.y+dy*0.65+py;
  return `M ${a.x} ${a.y} C ${c1x} ${c1y} ${c2x} ${c2y} ${b.x} ${b.y}`;
}

let pidx=0;
const edgeH=[], pulseH=[];
E.forEach(([aid,bid,anim,dashed])=>{
  const a=nmap[aid], b=nmap[bid];
  if(!a||!b) return;
  const pid=`p${pidx++}`;
  const col=dashed?'#1a2a1a':a.col;
  const op=dashed?0.7:0.3;
  const sw=anim?1.4:(dashed?0.8:1.1);
  const da=dashed?'3 4':'none';
  edgeH.push(`<path id="${pid}" d="${mkPath(a,b)}" stroke="${col}" stroke-width="${sw}" stroke-dasharray="${da}" fill="none" opacity="${op}"/>`);
  if(anim){
    const dur=(1.8+Math.random()*1.6).toFixed(2);
    const delay=(Math.random()*1.4).toFixed(2);
    pulseH.push(`<g opacity="0.9">
      <circle r="4.5" fill="${a.col}" filter="url(#gB)">
        <animateMotion dur="${dur}s" begin="${delay}s" repeatCount="indefinite" calcMode="linear"><mpath href="#${pid}"/></animateMotion>
      </circle>
      <circle r="2.5" fill="${a.col}" filter="url(#gA)">
        <animateMotion dur="${dur}s" begin="${delay}s" repeatCount="indefinite" calcMode="linear"><mpath href="#${pid}"/></animateMotion>
      </circle>
    </g>`);
  }
});
gEdges.innerHTML=edgeH.join('');
gPulses.innerHTML=pulseH.join('');

const nodeH=[], labelH=[];
N.forEach(n=>{
  const {x,y,r,col,lbl,id}=n;
  nodeH.push(`<circle cx="${x}" cy="${y}" r="${r*3.2}" fill="${col}" opacity="0.04" filter="url(#gC)"/>`);
  nodeH.push(`<circle cx="${x}" cy="${y}" r="${r*1.8}" fill="${col}" opacity="0.09" filter="url(#gB)"/>`);
  nodeH.push(`<circle cx="${x}" cy="${y}" r="${r}" fill="#07080f" stroke="${col}" stroke-width="${r>26?2.2:1.6}" opacity="0.95" filter="url(#gA)"/>`);
  if(r>26) nodeH.push(`<circle cx="${x}" cy="${y}" r="3" fill="${col}" opacity="0.6"/>`);
  nodeH.push(`<circle class="nd" data-id="${id}" cx="${x}" cy="${y}" r="${r+6}" fill="transparent" stroke="transparent" style="cursor:default;"/>`);
  const lines=lbl.split('\n');
  const ly=y+r+14;
  const fs=r>26?10:9;
  if(lines.length===1){
    labelH.push(`<text x="${x}" y="${ly}" text-anchor="middle" font-size="${fs}" font-weight="600" font-family="Courier New,monospace" fill="${col}" opacity="0.8">${lines[0]}</text>`);
  } else {
    labelH.push(`<text text-anchor="middle" font-family="Courier New,monospace" fill="${col}" opacity="0.8">
      <tspan x="${x}" y="${ly}" font-size="${fs}" font-weight="600">${lines[0]}</tspan>
      <tspan x="${x}" dy="13" font-size="${fs}" font-weight="600">${lines[1]}</tspan>
    </text>`);
  }
});
gNodes.innerHTML=nodeH.join('');
gLabels.innerHTML=labelH.join('');

// ── Tooltip
gNodes.addEventListener('mouseover',e=>{
  const nd=e.target.closest('.nd'); if(!nd) return;
  const n=nmap[nd.dataset.id]; if(!n) return;
  tip.innerHTML=`<b>${n.lbl.replace(/\n/g,' · ')}</b>${n.sub}`;
  tip.style.display='block';
});
gNodes.addEventListener('mousemove',e=>{
  const tw=tip.offsetWidth||290, th=tip.offsetHeight||150;
  tip.style.left=(e.clientX+18+tw>window.innerWidth?e.clientX-tw-14:e.clientX+18)+'px';
  tip.style.top=(e.clientY+12+th>window.innerHeight?e.clientY-th-10:e.clientY+12)+'px';
});
gNodes.addEventListener('mouseleave',()=>tip.style.display='none');

// ── Pan / Zoom
let tx=0,ty=0,ts=1,drag=false,lx=0,ly=0;
function fit(){
  const iw=window.innerWidth,ih=window.innerHeight,mw=1600,mh=1000;
  bgRect.setAttribute('width',mw); bgRect.setAttribute('height',mh);
  const s=Math.min(iw/mw,ih/mh)*0.88;
  ts=s; tx=(iw-mw*s)/2; ty=(ih-mh*s)/2; apply();
}
function apply(){ cvs.setAttribute('transform',`translate(${tx},${ty}) scale(${ts})`); }
svg.addEventListener('mousedown',e=>{ if(e.target.classList.contains('nd'))return; drag=true;lx=e.clientX;ly=e.clientY;svg.classList.add('drag'); });
window.addEventListener('mousemove',e=>{ if(!drag)return; tx+=e.clientX-lx;ty+=e.clientY-ly;lx=e.clientX;ly=e.clientY;apply(); });
window.addEventListener('mouseup',()=>{ drag=false;svg.classList.remove('drag'); });
svg.addEventListener('wheel',e=>{
  e.preventDefault();
  const s=e.deltaY<0?1.1:0.91;
  tx=e.clientX-(e.clientX-tx)*s; ty=e.clientY-(e.clientY-ty)*s; ts*=s; apply();
},{passive:false});
fit(); window.addEventListener('resize',fit);
</script>
</body>
