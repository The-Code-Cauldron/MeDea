<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MeDea — Offline</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{
    min-height:100vh;background:#1c1a16;color:#ece4d2;
    font-family:'Georgia',serif;display:flex;align-items:center;justify-content:center;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{text-align:center;padding:40px 24px}
  .mark{font-size:52px;font-weight:600;font-style:italic;letter-spacing:-.02em;margin-bottom:12px}
  .mark em{color:#7cc295}
  .rule{width:48px;height:2px;background:#2a5f43;margin:0 auto 24px}
  .msg{font-size:18px;line-height:1.5;color:#807a6c;max-width:28ch}
  .sub{margin-top:14px;font-family:'IBM Plex Sans',system-ui,sans-serif;
    font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:#534e44}
</style>
</head>
<body>
<div class="wrap">
  <div class="mark">Me<em>Dea</em></div>
  <div class="rule"></div>
  <p class="msg">The wire is quiet. Check your connection and try again.</p>
  <p class="sub">Offline · Signal lost</p>
</div>
</body>
</html>
