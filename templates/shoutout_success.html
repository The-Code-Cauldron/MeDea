<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MeDea — Message sent</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{--paper:#f6f1e6;--ink:#1c1a16;--pos-deep:#2a5f43;--rule:#e4dcc7;--serif:'Georgia',serif;--sans:system-ui,sans-serif}
  @media(prefers-color-scheme:dark){:root{--paper:#141310;--ink:#ece4d2;--pos-deep:#7cc295;--rule:#2a2720}}
  html,body{min-height:100vh;background:var(--paper);color:var(--ink);font-family:var(--sans);display:flex;align-items:center;justify-content:center}
  .card{max-width:420px;width:100%;padding:48px 40px;text-align:center}
  .mark{font-family:var(--serif);font-size:40px;font-weight:600;font-style:italic;margin-bottom:8px}
  .mark em{color:var(--pos-deep)}
  .rule{width:40px;height:2px;background:var(--pos-deep);margin:0 auto 28px}
  .msg{font-family:var(--serif);font-size:20px;line-height:1.45;font-weight:400;margin-bottom:8px}
  .sub{font-family:var(--sans);font-size:12px;color:#807a6c;letter-spacing:.04em;margin-bottom:32px}
  .back{display:inline-block;font-family:var(--sans);font-size:11px;letter-spacing:.18em;text-transform:uppercase;font-weight:700;color:var(--paper);background:var(--pos-deep);padding:11px 22px;text-decoration:none}
  .back:hover{opacity:.88}
</style>
</head>
<body>
<div class="card">
  <div class="mark">Me<em>Dea</em></div>
  <div class="rule"></div>
  <p class="msg">Message received.</p>
  <p class="sub">The Architect reads every one personally.</p>
  <a class="back" href="/">Back to the signal</a>
</div>
</body>
</html>
